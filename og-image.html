<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image — Karan Das</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  body{margin:0;display:grid;place-items:center;background:#222;min-height:100vh;font-family:'Space Grotesk',sans-serif}
  .og{width:1200px;height:630px;position:relative;overflow:hidden;background:#0A0A0B;color:#ECECEE;
      display:flex;flex-direction:column;justify-content:center;padding:0 90px;box-sizing:border-box}
  .og::before{content:"";position:absolute;width:560px;height:560px;border-radius:50%;top:-160px;right:-120px;
      background:radial-gradient(circle,rgba(16,185,129,.45),transparent 65%);filter:blur(20px)}
  .og::after{content:"";position:absolute;inset:0;opacity:.5;
      background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);background-size:34px 34px}
  .inner{position:relative;z-index:2}
  .chip{display:inline-flex;align-items:center;gap:9px;font-family:'JetBrains Mono';font-size:20px;color:#10B981;
      border:1px solid rgba(16,185,129,.4);background:rgba(16,185,129,.12);padding:8px 18px;border-radius:30px;margin-bottom:30px}
  .chip .d{width:9px;height:9px;border-radius:50%;background:#10B981}
  h1{font-size:96px;font-weight:700;letter-spacing:-.03em;margin:0 0 14px;line-height:1}
  h1 .a{color:#10B981}
  p{font-size:30px;color:#9A9AA2;margin:0;max-width:760px;font-family:'JetBrains Mono'}
  .foot{position:absolute;bottom:54px;left:90px;z-index:2;font-family:'JetBrains Mono';font-size:22px;color:#9A9AA2}
  .foot b{color:#ECECEE}
</style>
</head>
<body>
  <div class="og">
    <div class="inner">
      <span class="chip"><span class="d"></span> Available for work</span>
      <h1>Karan <span class="a">Das</span></h1>
      <p>&lt;Full-Stack Developer/&gt;</p>
    </div>
    <div class="foot">karan<b style="color:#10B981">.io</b> &nbsp;·&nbsp; <b>@karan-developer-333</b></div>
  </div>
</body>
</html>
